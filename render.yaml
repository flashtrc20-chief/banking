services:
  - type: web
    name: bolt-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bolt-db
          property: connectionString

databases:
  - name: bolt-db
    databaseName: neondb
    user: neondb_owner
    plan: free
